const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Resolução base do jogo (escala pixel-art)
const BASE_W = 400, BASE_H = 225;
let SCALE = 1;

function resize() {
  const sw = window.innerWidth / BASE_W;
  const sh = window.innerHeight / BASE_H;
  SCALE = Math.floor(Math.min(sw, sh)) || 1;
  if (SCALE < 1) SCALE = 1;
  canvas.width = BASE_W * SCALE;
  canvas.height = BASE_H * SCALE;
  ctx.setTransform(SCALE, 0, 0, SCALE, 0, 0);
  ctx.imageSmoothingEnabled = false;
}
resize();
window.addEventListener('resize', resize);

const SPRITES = {};
let spritesLoaded = 0;
const SPRITES_TOTAL = Object.keys(SPRITE_DATA).length;

for (const [key, src] of Object.entries(SPRITE_DATA)) {
  const img = new Image();
  img.onload = () => { spritesLoaded++; };
  img.src = src;
  SPRITES[key] = img;
}

function allSpritesReady() { return spritesLoaded >= SPRITES_TOTAL; }

// LPC frame layout:
// Sheet 832x256, frame 64x64, 13 cols x 4 rows
// Row 0=North, 1=West, 2=South, 3=East (facing right)
// We use row 3 for side-scroller; flip horizontally for left-facing
// walk: cols 0-8 (9 frames)
// idle: cols 0-1 (2 frames)
// jump: cols 0-4 (5 frames)
// hurt: row 0, cols 0-5 (6 frames) — sheet is only 64px tall

const LPC = {
  FRAME_W: 64, FRAME_H: 64,
  walk:  { row: 3, frames: 9, sheet: 'walk' },
  idle:  { row: 3, frames: 2, sheet: 'idle' },
  jump:  { row: 3, frames: 5, sheet: 'jump' },
  hurt:  { row: 0, frames: 6, sheet: 'hurt' },
};

// Drawn at scale: LPC frames are 64x64 but we render them at ~32x32 in game
// (player hitbox is 16x20, so we draw the sprite centered/offset)
const SPR_DRAW_W = 32;  // display width
const SPR_DRAW_H = 32;  // display height
const SPR_OFFSET_X = -8; // offset from player x so sprite is centered on hitbox
const SPR_OFFSET_Y = -12; // offset from player y (LPC sprites have lots of top space)

function getPlayerAnim(pl) {
  if (pl.dead || pl.invincible > 0 && Math.floor(pl.invincible/4)%2===1) return 'hurt';
  if (!pl.onGround) return 'jump';
  if (Math.abs(pl.vx) > 0.2) return 'walk';
  return 'idle';
}

function getSpeedrunAnim(sr, i) {
  if (sr.dead[i]) return 'hurt';
  if (!sr.onGround[i]) return 'jump';
  if (Math.abs(sr.vx[i]) > 0.2) return 'walk';
  return 'idle';
}

function drawPlayerSprite(x, y, facing, animFrame, anim, isP2) {
  const prefix = isP2 ? 'female' : 'male';
  const cfg = LPC[anim] || LPC.idle;
  const sheet = SPRITES[prefix + '_' + cfg.sheet];
  if (!sheet || !sheet.complete) {
    // Fallback: draw placeholder rect if sprites not loaded
    ctx.fillStyle = isP2 ? '#C45A8A' : '#4A90D9';
    ctx.fillRect(x, y, 16, 20);
    return;
  }

  const frameIdx = Math.floor(animFrame / 6) % cfg.frames;
  const sx = frameIdx * LPC.FRAME_W;
  const sy = cfg.row * LPC.FRAME_H;

  ctx.save();
  ctx.imageSmoothingEnabled = false;

  if (facing < 0) {
    // Flip horizontally around the center of the sprite
    ctx.translate(x + SPR_OFFSET_X + SPR_DRAW_W / 2, y + SPR_OFFSET_Y);
    ctx.scale(-1, 1);
    ctx.drawImage(sheet,
      sx, sy, LPC.FRAME_W, LPC.FRAME_H,
      -SPR_DRAW_W / 2, 0, SPR_DRAW_W, SPR_DRAW_H
    );
  } else {
    ctx.drawImage(sheet,
      sx, sy, LPC.FRAME_W, LPC.FRAME_H,
      x + SPR_OFFSET_X, y + SPR_OFFSET_Y, SPR_DRAW_W, SPR_DRAW_H
    );
  }
  ctx.restore();
}


// =====================================================================
// GAMEPAD (SNES USB)
// Layout SNES: B=0,Y=2,Select=8,Start=9,Up=12,Down=13,Left=14,Right=15,A=1,X=3,L=4,R=5
// =====================================================================
const gpState = [
  { left:false, right:false, up:false, down:false, a:false, b:false, start:false, select:false,
    _prev: {} },
  { left:false, right:false, up:false, down:false, a:false, b:false, start:false, select:false,
    _prev: {} }
];

function updateGamepads() {
  const gps = navigator.getGamepads ? navigator.getGamepads() : [];
  const validGPs = [];
  for (let i = 0; i < gps.length; i++) { if (gps[i]) validGPs.push(gps[i]); }
  document.getElementById('gp-count').textContent = validGPs.length;
  for (let slot = 0; slot < 2; slot++) {
    const gp = validGPs[slot];
    const s = gpState[slot];
    if (gp) {
      s._prev.left = s.left; s._prev.right = s.right; s._prev.up = s.up;
      s._prev.down = s.down; s._prev.a = s.a; s._prev.b = s.b;
      s._prev.start = s.start; s._prev.select = s.select;
      const ax = gp.axes[0] || 0;
      const ay = gp.axes[1] || 0;
      s.left   = !!(gp.buttons[14]?.pressed) || ax < -0.5;
      s.right  = !!(gp.buttons[15]?.pressed) || ax >  0.5;
      s.up     = !!(gp.buttons[12]?.pressed) || ay < -0.5;
      s.down   = !!(gp.buttons[13]?.pressed) || ay >  0.5;
      s.a      = !!(gp.buttons[1]?.pressed);
      s.b      = !!(gp.buttons[0]?.pressed);
      s.start  = !!(gp.buttons[9]?.pressed);
      s.select = !!(gp.buttons[8]?.pressed);
    }
  }
  s1kb(gpState[0]);
  s2kb(gpState[1]);
}

// Teclado fallback
const keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.key] = false; });

function s1kb(s) {
  // P1 teclado: WASD + Z/Espaço para pular — só aplica se não tiver gamepad no slot 0
  const gps = navigator.getGamepads ? navigator.getGamepads() : [];
  if (gps[0]) return; // gamepad conectado, ignora teclado
  const prev = s._prev;
  prev.left  = s.left;  prev.right = s.right;
  prev.up    = s.up;    prev.down  = s.down;
  prev.a     = s.a;     prev.b     = s.b;
  prev.start = s.start; prev.select = s.select;
  s.left  = !!keys['a'];
  s.right = !!keys['d'];
  s.up    = !!keys['w'];
  s.down  = !!keys['s'];
  s.a     = !!keys[' '] || !!keys['z'];
  s.b     = !!keys['x'];
  s.start = !!keys['Enter'];
}
function s2kb(s) {
  // P2 teclado: Setas + Numpad — só aplica se não tiver gamepad no slot 1
  const gps = navigator.getGamepads ? navigator.getGamepads() : [];
  if (gps[1]) return; // gamepad conectado, ignora teclado
  const prev = s._prev;
  prev.left  = s.left;  prev.right = s.right;
  prev.up    = s.up;    prev.down  = s.down;
  prev.a     = s.a;     prev.b     = s.b;
  prev.start = s.start; prev.select = s.select;
  s.left  = !!keys['ArrowLeft']  || !!keys['4'];
  s.right = !!keys['ArrowRight'] || !!keys['6'];
  s.up    = !!keys['ArrowUp']    || !!keys['8'];
  s.down  = !!keys['ArrowDown']  || !!keys['2'];
  s.a     = !!keys['0'] || !!keys[','] || !!keys['m'];
  s.b     = !!keys['n'] || !!keys['.'];
  s.start = !!keys['Shift'];
}

function pressed(p, btn) {
  return gpState[p][btn] && !gpState[p]._prev[btn];
}

const PAL = {

// =====================================================================
// PIXEL FONT (simplificada)
// =====================================================================
function drawText(text, x, y, size=8, color='#FFF', align='left', shadow=false) {
  ctx.save();
  ctx.font = `${size}px "Courier New"`;
  ctx.textBaseline = 'top';
  ctx.textAlign = align;
  if (shadow) {
    ctx.fillStyle = '#000';
    ctx.fillText(text, x+1, y+1);
  }
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
  ctx.restore();
}

function drawBox(x,y,w,h,bg='#000C',border='#FFF') {
  ctx.fillStyle = bg;
  ctx.fillRect(x,y,w,h);
  ctx.strokeStyle = border;
  ctx.lineWidth = 1;
  ctx.strokeRect(x+0.5,y+0.5,w-1,h-1);
}

// =====================================================================
// DESENHO DE SPRITES PIXEL ART
// =====================================================================
function drawPlayer(x, y, facing, frame, isP2, dead=false, onGround=false, vx=0, invincible=0) {
  // Determine animation
  let anim = 'idle';
  if (dead || (invincible > 0 && Math.floor(invincible/4)%2===1)) anim = 'hurt';
  else if (!onGround) anim = 'jump';
  else if (Math.abs(vx) > 0.2) anim = 'walk';

  ctx.save();
  if (dead) ctx.globalAlpha = 0.35;
  drawPlayerSprite(x, y, facing, frame, anim, isP2);
  ctx.restore();
}

function drawPlatform(x, y, w, theme) {
  if (theme === 'forest') {
    ctx.fillStyle = PAL.trunk;
    ctx.fillRect(x, y+4, w, 8);
    ctx.fillStyle = PAL.leaf;
    ctx.fillRect(x, y, w, 5);
    ctx.fillStyle = PAL.leaf2;
    for (let i = 0; i < w; i += 4) ctx.fillRect(x+i, y, 2, 3);
  } else if (theme === 'sea' || theme === 'deep') {
    ctx.fillStyle = '#4682B4';
    ctx.fillRect(x, y+2, w, 8);
    ctx.fillStyle = '#87CEEB';
    ctx.fillRect(x, y, w, 3);
    // coral decoration
    ctx.fillStyle = '#FF6B6B';
    for (let i = 4; i < w-4; i += 8) ctx.fillRect(x+i, y-2, 2, 3);
  } else {
    ctx.fillStyle = PAL.stone;
    ctx.fillRect(x, y, w, 10);
    ctx.fillStyle = '#888';
    ctx.fillRect(x, y, w, 2);
  }
}

function drawGoal(x, y, phase, anim) {
  const bob = Math.sin(anim * 0.05) * 2;
  ctx.save();
  ctx.translate(x, y + bob);
  // Glow
  const grd = ctx.createRadialGradient(8,8,2,8,8,12);
  grd.addColorStop(0, 'rgba(255,255,100,0.6)');
  grd.addColorStop(1, 'rgba(255,255,100,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(-4, -4, 24, 24);

  if (phase === 0) { // cachimbo
    ctx.fillStyle = '#5C3317';
    ctx.fillRect(2, 8, 12, 4);
    ctx.fillRect(10, 4, 4, 8);
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(1, 8, 14, 3);
    // smoke
    ctx.fillStyle = 'rgba(200,200,200,0.5)';
    ctx.fillRect(11+Math.floor(Math.sin(anim*0.1)), 1, 2, 4);
  } else if (phase === 1) { // colar de dente
    ctx.fillStyle = '#F5F5DC';
    for (let i = 0; i < 3; i++) { ctx.fillRect(4+i*4, 4, 2, 6); ctx.fillRect(4+i*4+1, 10, 2, 3); }
    ctx.fillStyle = '#8B7355';
    ctx.fillRect(2, 2, 12, 2);
  } else if (phase === 2) { // chapéu
    ctx.fillStyle = '#C8860A';
    ctx.fillRect(0, 10, 16, 4);
    ctx.fillRect(3, 5, 10, 6);
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(1, 9, 14, 2);
  } else if (phase === 3) { // superfície (boia)
    ctx.fillStyle = '#FF4500';
    ctx.fillRect(2, 4, 12, 8);
    ctx.fillStyle = '#FFF';
    ctx.fillRect(2, 7, 12, 2);
  }
  ctx.restore();
}

// =====================================================================
// FÍSICA GENÉRICA
// =====================================================================
const GRAVITY = 0.35;
const JUMP_FORCE = -6.5;
const MOVE_SPEED = 1.8;

function collidesRect(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function updatePlayer(pl, idx, phaseData) {
  if (pl.dead) {
    pl.deadTimer--;
    if (pl.deadTimer <= 0) { pl.dead = false; pl.invincible = 120; respawnPlayer(pl, idx, phaseData); }
    return;
  }
  if (pl.invincible > 0) pl.invincible--;

  const gp = gpState[idx];
  // Movimento horizontal
  let moved = false;
  if (gp.left)  { pl.vx = -MOVE_SPEED; pl.facing = -1; moved = true; }
  else if (gp.right){ pl.vx =  MOVE_SPEED; pl.facing =  1; moved = true; }
  else pl.vx *= 0.6;

  // Pulo
  if ((gp.a || gp.up) && pl.onGround) { pl.vy = JUMP_FORCE; pl.onGround = false; }

  // Gravidade
  pl.vy += GRAVITY;
  if (pl.vy > 10) pl.vy = 10;

  pl.x += pl.vx;
  pl.y += pl.vy;
  pl.onGround = false;

  // Colisão com plataformas
  for (const plat of phaseData.platforms) {
    const prevBottom = pl.y + pl.h - pl.vy;
    if (collidesRect(pl.x, pl.y, pl.w, pl.h, plat.x, plat.y, plat.w, 10)) {
      if (pl.vy >= 0 && prevBottom <= plat.y + 2) {
        pl.y = plat.y - pl.h;
        pl.vy = 0;
        pl.onGround = true;
      } else if (pl.vy < 0) {
        pl.y = plat.y + 10;
        pl.vy = 0;
      } else {
        if (pl.vx > 0) pl.x = plat.x - pl.w;
        else pl.x = plat.x + plat.w;
        pl.vx = 0;
      }
    }
    // Moving platforms
    if (plat.type === 'moving') {
      plat.x += plat.dx;
      if (plat.x < plat.patrolX[0] || plat.x + plat.w > plat.patrolX[1]) plat.dx *= -1;
    }
  }

  // Colisão com spikes
  if (pl.invincible === 0) {
    for (const sp of phaseData.spikes) {
      if (collidesRect(pl.x, pl.y, pl.w, pl.h, sp.x, sp.y || (phaseData.totalH-24), sp.w, 8)) {
        killPlayer(pl);
        return;
      }
    }
  }

  // Colisão com inimigos
  if (pl.invincible === 0) {
    for (const en of phaseData.enemies) {
      if (collidesRect(pl.x, pl.y, pl.w, pl.h, en.x, en.y, 14, 14)) {
        // Pular em cima mata o inimigo
        if (pl.vy > 0 && pl.y + pl.h < en.y + 8) {
          en.dead = true; pl.vy = -4;
        } else {
          killPlayer(pl); return;
        }
      }
    }
  }

  // Limites
  if (pl.x < 0) pl.x = 0;
  if (pl.x + pl.w > BASE_W) pl.x = BASE_W - pl.w;
  if (pl.y > phaseData.totalH) { killPlayer(pl); return; }

  // Animação
  if (moved && pl.onGround) pl.frame++;

  // Check goal
  if (collidesRect(pl.x, pl.y, pl.w, pl.h, phaseData.goal.x-phaseData.scrollY%BASE_W, phaseData.goal.y, 16, 16)) {
    // corrigir: goal é no espaço do mundo
  }
}

function killPlayer(pl) {
  if (pl.invincible > 0) return;
  pl.dead = true; pl.deadTimer = 60; pl.lives--;
  pl.atGoal = false;
}

function respawnPlayer(pl, idx, phaseData) {
  if (idx === 0) { pl.x = 20; } else { pl.x = 40; }
  pl.y = phaseData.totalH - 50;
  if (currentPhase === 1) { pl.y = 50; } // fase que começa no topo
  pl.vx = 0; pl.vy = 0;
}

function updateEnemies(phaseData) {
  for (const en of phaseData.enemies) {
    if (en.dead) continue;
    en.x += en.vx;
    if (en.x < en.patrolX[0] || en.x + 14 > en.patrolX[1]) en.vx *= -1;
    // Gravidade básica
    en.vy = (en.vy || 0) + GRAVITY;
    en.y += en.vy;
    // Chão para inimigos (usa plataformas)
    for (const plat of phaseData.platforms) {
      if (collidesRect(en.x, en.y, 14, 14, plat.x, plat.y, plat.w, 10)) {
        if (en.vy >= 0) { en.y = plat.y - 14; en.vy = 0; }
      }
    }
    if (en.y > phaseData.totalH) en.y = phaseData.totalH - 50;
  }
}

// =====================================================================
// CÂMERA / SCROLL
// =====================================================================
function updateCamera(phaseData) {
  // Câmera segue a posição média dos dois jogadores (eixo Y)
  const avgY = (players[0].y + players[1].y) / 2;
  const targetScroll = avgY - BASE_H / 2;
  phaseData.scrollY += (targetScroll - phaseData.scrollY) * 0.1;
  phaseData.scrollY = Math.max(0, Math.min(phaseData.totalH - BASE_H, phaseData.scrollY));
}

// =====================================================================
// RENDER DE FASE
// =====================================================================
function drawBackground(phaseData, anim) {
  const t = phaseData.theme;
  const sy = phaseData.scrollY;

  if (t === 'forest') {
    // Gradiente céu
    const grd = ctx.createLinearGradient(0,0,0,BASE_H);
    grd.addColorStop(0,'#87CEEB'); grd.addColorStop(1,'#C8E8FF');
    ctx.fillStyle = grd; ctx.fillRect(0,0,BASE_W,BASE_H);
    // Nuvens
    ctx.fillStyle = '#FFFe'; 
    [[30,20],[120,35],[250,15],[340,30]].forEach(([cx,cy])=>{
      const nx = ((cx - sy*0.1) % BASE_W + BASE_W) % BASE_W;
      ctx.fillRect(nx,cy,30,12); ctx.fillRect(nx+8,cy-6,14,10);
    });
    // Árvores de fundo
    ctx.fillStyle = '#1A5C1A';
    for (let i = 0; i < 10; i++) {
      const tx = (i*45 - sy*0.05) % BASE_W;
      ctx.fillRect(tx, BASE_H-60-sy%50, 20, 60);
      ctx.fillStyle='#2D7A2D'; ctx.fillRect(tx-8, BASE_H-90-sy%50, 36, 40);
      ctx.fillStyle='#6B3E26';
    }
  } else if (t === 'sea' || t === 'deep') {
    const grd = ctx.createLinearGradient(0,0,0,BASE_H);
    if (t === 'sea') { grd.addColorStop(0,'#006994'); grd.addColorStop(1,'#003366'); }
    else { grd.addColorStop(0,'#003366'); grd.addColorStop(1,'#000820'); }
    ctx.fillStyle = grd; ctx.fillRect(0,0,BASE_W,BASE_H);
    // Bolhas
    ctx.fillStyle = 'rgba(100,200,255,0.2)';
    for (let i = 0; i < 8; i++) {
      const bx = (i*52 + anim*0.3 + sy*0.1) % BASE_W;
      const by = (i*30 + anim*0.5) % BASE_H;
      ctx.beginPath(); ctx.arc(bx,by,3,0,Math.PI*2); ctx.fill();
    }
    // Plantas aquáticas
    ctx.fillStyle = '#006400';
    for (let i = 0; i < 6; i++) {
      const wx = i*70;
      const wy = BASE_H - 20;
      for (let j = 0; j < 3; j++) {
        ctx.fillRect(wx+j*6, wy-20-j*5, 4, 25+j*5);
      }
    }
  }
}

function drawPhaseWorld(phaseData, anim) {
  const sy = phaseData.scrollY;
  ctx.save();
  ctx.translate(0, -sy);

  // Plataformas
  for (const plat of phaseData.platforms) {
    drawPlatform(plat.x, plat.y, plat.w, phaseData.theme);
  }

  // Spikes
  ctx.fillStyle = '#888';
  for (const sp of phaseData.spikes) {
    const sy2 = sp.y || (phaseData.totalH - 24);
    for (let i = 0; i < sp.w; i += 6) {
      ctx.beginPath();
      ctx.moveTo(sp.x+i, sy2+8);
      ctx.lineTo(sp.x+i+3, sy2);
      ctx.lineTo(sp.x+i+6, sy2+8);
      ctx.fill();
    }
  }

  // Inimigos
  for (const en of phaseData.enemies) {
    if (en.dead) continue;
    drawEnemy(en, phaseData.theme, anim);
  }

  // Moving platforms
  for (const plat of phaseData.platforms) {
    if (plat.type === 'moving') {
      ctx.fillStyle = '#888';
      ctx.fillRect(plat.x, plat.y, plat.w, 8);
    }
  }

  // Goal
  drawGoal(phaseData.goal.x, phaseData.goal.y, currentPhase, anim);

  // Jogadores
  for (const pl of players) {
    if (!pl.dead) {
      if (pl.invincible % 4 < 2) {
        drawPlayer(pl.x, pl.y, pl.facing, pl.frame, pl.isP2, pl.dead, pl.onGround, pl.vx, pl.invincible);
      }
    }
  }

  ctx.restore();
}

function drawEnemy(en, theme, anim) {
  const bob = Math.sin(anim * 0.08) * 2;
  if (theme === 'forest') {
    // Cogumelo saltador
    ctx.fillStyle = '#CC3300';
    ctx.fillRect(en.x, en.y+4, 14, 10);
    ctx.fillStyle = '#FF6633';
    for (let i = 0; i < 3; i++) ctx.fillRect(en.x+2+i*4, en.y+5, 2, 2);
    ctx.fillStyle = '#F5CBA7';
    ctx.fillRect(en.x+3, en.y+8, 8, 6);
    // Olhos
    ctx.fillStyle = '#000';
    ctx.fillRect(en.x+4, en.y+9, 2, 2);
    ctx.fillRect(en.x+8, en.y+9, 2, 2);
  } else if (theme === 'sea') {
    // Peixe
    ctx.fillStyle = '#FF8C00';
    ctx.fillRect(en.x, en.y+bob, 14, 10);
    ctx.fillStyle = '#FFB84D';
    ctx.fillRect(en.x+2, en.y+2+bob, 8, 6);
    ctx.fillStyle = '#000';
    ctx.fillRect(en.x+10, en.y+3+bob, 2, 2);
    // Cauda
    ctx.fillStyle = '#FF6600';
    if (en.vx > 0) {
      ctx.fillRect(en.x-4, en.y+1+bob, 5, 8);
    } else {
      ctx.fillRect(en.x+13, en.y+1+bob, 5, 8);
    }
  } else {
    // Enguia
    ctx.fillStyle = '#4B0082';
    ctx.fillRect(en.x, en.y+bob, 16, 8);
    ctx.fillStyle = '#6A0DAD';
    ctx.fillRect(en.x+2, en.y+1+bob, 12, 5);

}

// =====================================================================
// SPEEDRUN (Fase 5 - Boitatá)
// =====================================================================
const SR_GRAVITY = 0.4, SR_JUMP = -7, SR_SPEED = 2.5;

function updateSpeedrun() {
  const sr = speedrunState;
  sr.timer++;

  // Aumenta velocidade do fogo com o tempo
  sr.fireSpeed = 0.5 + sr.timer * 0.0004;
  sr.fireX += sr.fireSpeed;

  // Jogadores
  for (let i = 0; i < 2; i++) {
    if (sr.dead[i]) continue;
    const gp = gpState[i];
    if (gp.left)  { sr.vx[i] = -SR_SPEED; }
    else if (gp.right) { sr.vx[i] = SR_SPEED; }
    else sr.vx[i] *= 0.7;

    if ((gp.a || gp.up) && sr.onGround[i]) { sr.vy[i] = SR_JUMP; sr.onGround[i] = false; }

    sr.vy[i] += SR_GRAVITY;
    if (sr.vy[i] > 12) sr.vy[i] = 12;
    sr.playerX[i] += sr.vx[i];
    sr.playerY[i] += sr.vy[i];
    sr.onGround[i] = false;

    // Plataformas
    for (const plat of sr.platforms) {
      const px = sr.playerX[i], py = sr.playerY[i];
      const prevBottom = py + 20 - sr.vy[i];
      if (collidesRect(px, py, 16, 20, plat.x, plat.y, plat.w, plat.h)) {
        if (sr.vy[i] >= 0 && prevBottom <= plat.y + 2) {
          sr.playerY[i] = plat.y - 20;
          sr.vy[i] = 0;
          sr.onGround[i] = true;
        } else if (sr.vy[i] < 0) {
          sr.playerY[i] = plat.y + plat.h;
          sr.vy[i] = 0;
        } else {
          if (sr.vx[i] > 0) sr.playerX[i] = plat.x - 16;
          else sr.playerX[i] = plat.x + plat.w;
          sr.vx[i] = 0;
        }
      }
    }

    // Obstáculos (pedras)
    for (const obs of sr.obstacles) {
      if (obs.type === 'rock') {
        if (collidesRect(sr.playerX[i], sr.playerY[i], 16, 20, obs.x, obs.y, obs.w, obs.h)) {
          // Morre (fogo alcançou)
          sr.dead[i] = true;
        }
      }
    }

    // Fogo alcançou?
    const worldPX = sr.playerX[i] + sr.scrollX;
    if (sr.fireX >= worldPX - 5) sr.dead[i] = true;

    // Fell off
    if (sr.playerY[i] > 220) sr.dead[i] = true;

    // Scroll
    sr.scrollX = Math.max(0, Math.min(sr.worldW - BASE_W, sr.playerX[i] - BASE_W * 0.4));

    // Andar
    if (Math.abs(sr.vx[i]) > 0.1) sr.frame[i]++;
    if (sr.vx[i] > 0) sr.facing[i] = 1;
    if (sr.vx[i] < 0) sr.facing[i] = -1;

    // Chegou ao fim?
    if (sr.playerX[i] + sr.scrollX >= sr.worldW - 30) {
      sr.complete = true;
    }
  }

  // Game over se ambos mortos
  if (sr.dead[0] && sr.dead[1]) { sr.gameOver = true; }
  // Se um chegar
  if (sr.complete) {
    STATE = 'STORY';
    storyList = STORIES[6];
    storyIdx = 0; storyNext = () => showMenu(['JOGAR DE NOVO','SAIR'], (opt) => {
      if (opt === 0) startGame();
      else if (opt === 1) window.close?.() || location.reload();
    });
  }
  if (sr.gameOver && !sr.complete) {
    STATE = 'STORY';
    storyList = STORIES[5];
    storyIdx = 0; storyNext = () => showMenu(['TENTAR DE NOVO','SAIR'], (opt) => {
      if (opt === 0) { buildSpeedrun(); STATE = 'SPEEDRUN'; }
      else location.reload();
    });
  }
}

function drawSpeedrun() {
  const sr = speedrunState;

  // BG floresta em chamas
  const grd = ctx.createLinearGradient(0,0,0,BASE_H);
  grd.addColorStop(0,'#200500'); grd.addColorStop(1,'#0A0000');
  ctx.fillStyle = grd; ctx.fillRect(0,0,BASE_W,BASE_H);

  ctx.save();
  ctx.translate(-sr.scrollX, 0);

  // Chão
  ctx.fillStyle = '#5C2800';
  ctx.fillRect(0, 200, sr.worldW, 25);

  // Árvores em chamas (fundo)
  for (let i = 0; i < 16; i++) {
    const tx = i * 100;
    const fireAnim = Math.floor(phaseAnim/4)%3;
    ctx.fillStyle = '#2D0000'; ctx.fillRect(tx+5, 100, 12, 100);
    // Chamas na árvore
    ctx.fillStyle = ['#FF4500','#FF8C00','#FFD700'][fireAnim];
    ctx.fillRect(tx-10, 80, 32, 30);
    ctx.fillStyle = ['#FF6500','#FFA500','#FFE700'][(fireAnim+1)%3];
    ctx.fillRect(tx-5, 60, 22, 30);
  }

  // Plataformas
  for (const plat of sr.platforms) {
    ctx.fillStyle = '#4A2000';
    ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
    ctx.fillStyle = '#663300';
    ctx.fillRect(plat.x, plat.y, plat.w, 3);
  }

  // Obstáculos
  for (const obs of sr.obstacles) {
    if (obs.type === 'rock') {
      ctx.fillStyle = '#555'; ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
      ctx.fillStyle = '#777'; ctx.fillRect(obs.x+1, obs.y+1, obs.w-4, 4);
    }
  }

  // Boitatá (perseguidor)
  const fx = sr.fireX - 20;
  for (let i = 0; i < 6; i++) {
    const seg = i * 20;
    const sy2 = 175 + Math.sin(phaseAnim*0.15+i)*15;
    ctx.fillStyle = ['#FF2200','#FF4400','#FF6600','#FF8800','#FFAA00','#FFCC00'][i];
    ctx.fillRect(fx + seg, sy2, 25, 22);
  }
  // Cabeça boitatá
  ctx.fillStyle = '#FF3300'; ctx.fillRect(fx, 168, 28, 28);
  ctx.fillStyle = '#FFD700'; ctx.fillRect(fx+4, 172, 6, 6); ctx.fillRect(fx+16, 172, 6, 6);
  // Língua
  ctx.fillStyle = '#FF0000'; ctx.fillRect(fx+10, 192, 4, 8);

  // Jogadores
  for (let i = 0; i < 2; i++) {
    if (!sr.dead[i]) {
      const pl = {facing: sr.facing[i], frame: sr.frame[i]};
      drawPlayer(sr.playerX[i], sr.playerY[i], sr.facing[i], sr.frame[i], i===1, sr.dead[i], sr.onGround[i], sr.vx[i], 0);
    }
  }

  // Meta
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(sr.worldW - 25, 160, 5, 40);
  for (let i = 0; i < 4; i++) ctx.fillStyle = i%2===0?'#FFD700':'#000', ctx.fillRect(sr.worldW-25, 160+i*10, 20, 10);

  ctx.restore();

  // Fogo overlay à esquerda
  const fgrd = ctx.createLinearGradient(0,0,80,0);
  fgrd.addColorStop(0,'rgba(255,60,0,0.8)');
  fgrd.addColorStop(1,'rgba(255,60,0,0)');
  const fireScreenX = sr.fireX - sr.scrollX + 30;
  if (fireScreenX < BASE_W) {
    ctx.fillStyle = fgrd; ctx.fillRect(0, 0, Math.min(fireScreenX+30, BASE_W), BASE_H);
  }

  // HUD speedrun
  const progress = Math.min(1, (sr.scrollX + BASE_W/2) / (sr.worldW - BASE_W));
  drawBox(10, 10, BASE_W-20, 10, 'rgba(0,0,0,0.7)', '#888');
  ctx.fillStyle = '#FF4500'; ctx.fillRect(11, 11, (BASE_W-22)*progress, 8);
  ctx.fillStyle = '#FFD700'; ctx.fillRect(11+(BASE_W-22)*progress-2, 9, 4, 12);
  drawText('CORRAM!', BASE_W/2, 24, 9, '#FF4500', 'center', true);
  drawText('FASE 5: BOITATÁ', BASE_W/2, 5, 6, '#FFD700', 'center', true);
  if (sr.dead[0] && !sr.dead[1]) drawText('P1 MORREU!', 10, BASE_H/2, 9, '#F00', 'left', true);
  if (sr.dead[1] && !sr.dead[0]) drawText('P2 MORREU!', BASE_W-10, BASE_H/2, 9, '#F00', 'right', true);
}

// =====================================================================
// GAME LOOP
// =====================================================================
function startGame() {
  currentPhase = 0;
  STATE = 'STORY';
  storyList = STORIES[0];
  storyIdx = 0;
  storyNext = () => startPhase(0);
}

function startPhase(n) {
  currentPhase = n;
  if (n === 4) {
    buildSpeedrun();
    STATE = 'SPEEDRUN';
    return;
  }
  phase = buildPhase(n);
  const startY = phase.totalH - 50;
  const startY2 = (n === 1 || n === 3) ? 50 : startY;
  // Para fase que começa no topo
  const py = (n === 1) ? 50 : startY;
  players = [makePlayer(20, py, false), makePlayer(40, py+4, true)];
  goalReached = [false, false];
  phaseComplete = false;
  STATE = 'GAME';
}

function checkGoal() {
  if (!phase || phaseComplete) return;
  for (let i = 0; i < players.length; i++) {
    const pl = players[i];
    if (!pl.dead) {
      const gx = phase.goal.x;
      const gy = phase.goal.y;
      if (collidesRect(pl.x, pl.y, pl.w, pl.h, gx-4, gy-4, 24, 24)) {
        pl.atGoal = true;
        goalReached[i] = true;
      }
    }
  }
  if (goalReached[0] && goalReached[1]) {
    phaseComplete = true;
    setTimeout(() => {
      const endStory = STORIES[currentPhase + 1];
      showStory(endStory, () => {
        showMenu(['SIM, CONTINUAR!', 'NÃO, SAIR'], (opt) => {
          if (opt === 0) startPhase(currentPhase + 1);
          else location.reload();
        });
      });
    }, 500);
  }
}

let lastTime = 0;
function loop(ts) {
  const dt = ts - lastTime; lastTime = ts;
  updateGamepads();
  phaseAnim++;

  ctx.clearRect(0, 0, BASE_W, BASE_H);

  // Loading screen while sprites load
  if (!allSpritesReady()) {
    const prog = spritesLoaded / SPRITES_TOTAL;
    ctx.fillStyle = '#0A0A2E'; ctx.fillRect(0,0,BASE_W,BASE_H);
    drawText('LENDAS DO BRASIL', BASE_W/2, BASE_H/2-30, 14, '#FFD700', 'center', true);
    drawText('Carregando sprites...', BASE_W/2, BASE_H/2, 8, '#FFF', 'center', true);
    drawBox(BASE_W/2-60, BASE_H/2+14, 120, 10, '#111', '#FFD700');
    ctx.fillStyle = '#FFD700'; ctx.fillRect(BASE_W/2-59, BASE_H/2+15, Math.floor(118*prog), 8);
    drawText(spritesLoaded + '/' + SPRITES_TOTAL, BASE_W/2, BASE_H/2+28, 7, '#AAA', 'center');
    requestAnimationFrame(loop); return;
  }

  if (STATE === 'TITLE') {
    drawTitle();
    // Input
    if (pressed(0, 'up') || pressed(1, 'up')) menuCursor = (menuCursor - 1 + 2) % 2;
    if (pressed(0, 'down') || pressed(1, 'down')) menuCursor = (menuCursor + 1) % 2;
    if (pressed(0, 'a') || pressed(1, 'a') || pressed(0, 'start') || pressed(1, 'start')) {
      if (menuCursor === 0) { storyList = STORIES[0]; storyIdx = 0; storyNext = () => startPhase(0); STATE='STORY'; }
      else location.reload();
    }
    // Teclado Enter para começar
    if (keys['Enter']) { storyList = STORIES[0]; storyIdx = 0; storyNext = () => startPhase(0); STATE='STORY'; }
  }
  else if (STATE === 'STORY') {
    drawStory();
    if (pressed(0,'a') || pressed(1,'a') || pressed(0,'start') || pressed(1,'start') || keys['Enter']) {
      delete keys['Enter'];
      storyIdx++;
      if (storyIdx >= storyList.length) {
        if (storyNext) storyNext();
        else STATE = 'TITLE';
      }
    }
  }
  else if (STATE === 'GAME') {
    if (!phase) { STATE='TITLE'; requestAnimationFrame(loop); return; }
    // Update
    updateEnemies(phase);
    for (let i = 0; i < players.length; i++) {
      updatePlayer(players[i], i, phase);
      // Attach scroll check for goal relative to world
    }
    updateCamera(phase);
    checkGoalWorld();

    // Check lives
    let allDead = true;
    for (const pl of players) { if (pl.lives > 0) allDead = false; }
    if (allDead) { STATE='TITLE'; }

    // Draw
    drawBackground(phase, phaseAnim);
    drawPhaseWorld(phase, phaseAnim);
    drawHUD();

    if (phaseComplete) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0,0,BASE_W,BASE_H);
      drawText('OBJETIVO ALCANÇADO!', BASE_W/2, BASE_H/2-10, 12, '#FFD700', 'center', true);
    }
  }
  else if (STATE === 'SPEEDRUN') {
    updateSpeedrun();
    drawSpeedrun();
  }
  else if (STATE === 'MENU') {
    // Redesenha o fundo
    if (phase) { drawBackground(phase, phaseAnim); drawPhaseWorld(phase, phaseAnim); }
    drawMenu();
    if (pressed(0,'up') || pressed(1,'up')) menuCursor = (menuCursor - 1 + menuOptions.length) % menuOptions.length;
    if (pressed(0,'down') || pressed(1,'down')) menuCursor = (menuCursor + 1) % menuOptions.length;
    if (pressed(0,'a') || pressed(1,'a') || pressed(0,'start') || pressed(1,'start')) {
      if (menuCallback) menuCallback(menuCursor);
    }
  }

  requestAnimationFrame(loop);
}

function checkGoalWorld() {
  if (!phase || phaseComplete) return;
  for (let i = 0; i < players.length; i++) {
    const pl = players[i];
    if (!pl.dead && pl.lives > 0) {
      const gx = phase.goal.x;
      const gy = phase.goal.y;
      // goal está no espaço do mundo, pl.y é no espaço do mundo
      if (collidesRect(pl.x, pl.y, pl.w, pl.h, gx-4, gy-4, 24, 24)) {
        pl.atGoal = true;
        goalReached[i] = true;
      }
    }
  }
  if (goalReached[0] && goalReached[1] && !phaseComplete) {
    phaseComplete = true;
    setTimeout(() => {
      const endStory = STORIES[currentPhase + 1];
      showStory(endStory, () => {
        const isLast = currentPhase === 3;
        showMenu(['SIM, CONTINUAR!', 'NÃO, SAIR'], (opt) => {
          if (opt === 0) startPhase(currentPhase + 1);
          else { STATE='TITLE'; menuCursor=0; }
        });
      });
    }, 800);
  }
}

// Inicialização
menuCursor = 0;
STATE = 'TITLE';
requestAnimationFrame(loop);
</script>
